<!-- ───────────────────────────────────────────────────────────────
     Firebase Compat SDKs — DB + Auth (anonymous only)
     No Storage SDK (HSE photos use base64 fallback to stay on Spark)
     ─────────────────────────────────────────────────────────────── -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<!-- ───────────────────────────────────────────────────────────────
     v10 core layer  (load order matters)
     1. firebase.js   → exposes fbDB / fbAuth / fbReady (anon-auth)
     2. dom.js        → esc(), el(), safeHTML()
     3. edit-lock.js  → window.editLock (session-only password gate)
     4. data-api.js   → window.dataApi.* (mutators)
     5. realtime.js   → window.realtime.* (listeners)
     6. data.js       → defines window.DB
     7. legacy-shim   → maps old globals (CU, scheduleSave, doLogin, reqLogin)
     8. renderers
     9. loader.js     → boots
     ─────────────────────────────────────────────────────────────── -->
<script src="js/firebase.js"></script>
<script src="js/dom.js"></script>
<script src="js/edit-lock.js"></script>
<script src="js/data-api.js"></script>
<script src="js/realtime.js"></script>

<script src="js/data.js"></script>
<script src="js/legacy-shim.js"></script>

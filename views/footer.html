<div id="ft">
  <div>Continuum Green Energy | SWPPL 140MW Hybrid EPC | Kudligi, Karnataka</div>
  <div>
    <span class="ldot"></span>Live |
    <span id="ft-date">—</span> |
    <span id="ft-fb-info" data-tt="Verifies both devices are reading from the same Firebase project">DB: <code style="font-size:9px;background:rgba(255,255,255,.06);padding:1px 4px;border-radius:3px;">—</code></span> |
    v9.1-demo
  </div>
</div>
<script>
  // Populate footer with the live Firebase project ID + connection state.
  // Helps verify multi-device sync — both devices must show the same project.
  (function () {
    const id = document.getElementById('ft-fb-info');
    if (!id) return;
    const code = id.querySelector('code');
    function refresh() {
      if (!window.firebaseConfig || !code) return;
      const ok = document.documentElement.dataset.fbConnected === '1';
      code.textContent = (window.firebaseConfig.projectId || '?') + ' · ' + (ok ? '☁️ connected' : '⚠️ offline');
      code.style.color = ok ? 'var(--ok,#3ddc84)' : 'var(--wn,#ffb74d)';
    }
    refresh();
    setInterval(refresh, 2000);
  })();
</script>

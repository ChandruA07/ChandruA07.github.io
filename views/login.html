<div id="lw" class="lw" style="display:none;">
  <div class="lb">
    <div class="li" id="l-i">🔓</div>
    <div class="lt" id="l-t">Edit mode</div>
    <div class="ls" id="l-s">Password required to make changes</div>

    <!-- Username field hidden in v10; kept for legacy markup compatibility -->
    <div class="fg" style="display:none;">
      <label class="fl">Email</label>
      <input class="fi" id="l-u" type="text" autocomplete="off">
    </div>

    <div class="fg" style="text-align:left;margin-top:8px;">
      <label class="fl">Password</label>
      <input class="fi" id="l-p" type="password" autocomplete="current-password"
             placeholder="Enter edit password"
             onkeydown="if(event.key==='Enter')editLock.submit();">
    </div>

    <div class="le" id="l-e"></div>

    <div style="display:flex;gap:7px;margin-top:7px;">
      <button class="btn"     style="flex:1;" onclick="editLock.cancel()">Cancel</button>
      <button class="btn bta" style="flex:1;" onclick="editLock.submit()">Unlock →</button>
    </div>

    <div style="margin-top:9px;padding:7px;background:var(--card3);border-radius:6px;
                font-size:8px;color:var(--t3);text-align:left;line-height:1.5;">
      <b>ℹ️ About edit mode</b><br>
      Browsing the dashboard and adding POD entries requires no password. The edit
      password is only needed to update progress numbers (Solar / WTG / BOP) or
      add HSE observations. Unlocked until this tab is closed.
    </div>
  </div>
</div>
